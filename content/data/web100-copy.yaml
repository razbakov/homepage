    emptyBody: "Sobald das erste Video live ist, erscheint es hier. In der Zwischenzeit: abonniere auf YouTube, um nichts zu verpassen."
    subscribeCta: "Auf YouTube abonnieren"
  bet:
    title: "Warum kostenlos?"
    body: "Ich finde meine Leute, indem ich laut baue. Du bekommst eine echte Website ohne Risiko; ich bekomme echte Projekte, Referenzen und Kunden, die dieselbe Sprache sprechen. Wenn sie dir etwas wert ist, zahl, was du für fair hältst."

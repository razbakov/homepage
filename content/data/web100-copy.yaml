# Copy for /web100 landing page.
# German is primary. Other locales are light translations — safe to copy-DE
# if not yet localized. Fallback order in the page: user locale -> de -> en.
#
# Keep tone: direct, warm, polyglot-but-grounded. Match razbakov.com voice.
# The offer is pay-what-you-want: I build your site for free, you donate
# what you think it's worth. No fixed price, no deadline, ongoing.


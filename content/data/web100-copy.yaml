  faq:
    title: "Частые вопросы"
    items:
      - q: "Правда бесплатно? В чём подвох?"
        a: "Подвоха нет, но есть чёткий объём. Получаешь простой, честный сайт: без магазина, без наворотов, без огромного скоупа. Я могу это делать только потому, что собираю много похожих сайтов параллельно и переиспользую шаблоны. Понравится — платишь, сколько считаешь справедливым. Нужно больше — обсудим более крупный проект отдельно."
      - q: "Сколько же платить?"
        a: "Сколько хочешь — даже ноль нормально. «Плати сколько хочешь» означает: ты сам решаешь, сколько сайт для тебя стоит. Кто-то платит как за ужин, кто-то больше, кто-то жертвует позже, когда сайт начинает приводить клиентов. Без давления."
      - q: "Сколько это реально занимает?"
        a: "7 дней с того момента, как у меня есть твой материал (текст, фото, лого, контакты). Если материал ещё нужно собрать, будет дольше. Это почти всегда узкое место — не мой код."
      - q: "А если мне не понравится результат?"

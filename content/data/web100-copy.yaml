      email: "I need a valid email to reply."
      urlFormat: "That doesn't look like a URL (e.g. https://example.com)."
      language: "Which language should it be in?"
  faq:
    title: "Frequently asked"
    items:
      - q: "Really free? What's the catch?"
        a: "No catch, but a clear scope. You get a simple, honest website — no shop, no wild extensions, no giant scope. I can only do this because I'm building many similar sites in parallel and reusing templates. If you like it, you pay what you think is fair. Want more? We scope a bigger project separately."
      - q: "So how much should I pay?"
        a: "Whatever you want — even nothing is fine. Pay what you want means you decide what the website is worth to you. Some pay the price of a dinner, some more, some donate later once the site brings them clients. No pressure."
      - q: "How long does it really take?"
        a: "7 days from the moment I have your material (text, images, logo, contact). If you still have to gather your material, it takes longer. That's almost always the bottleneck — not my code."
      - q: "What if I don't like the result?"
        a: "One round of feedback is included — you say what's off, I adjust. If you still don't like it in the end, you simply pay nothing. Nobody wants a website they don't like."
      - q: "Why do this publicly with YouTube audits?"
        a: "Because I find my people by thinking out loud. The audits let you see how I work before we start. And they help me find clients who speak the same language."
      - q: "Can I keep building on the site myself later?"
        a: "Yes. You get the code, the domain is in your name, no lock-ins. Keep going on your own if you want. If you want maintenance, we talk about a separate monthly subscription."

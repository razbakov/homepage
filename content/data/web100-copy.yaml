      - "Eigene Domain verknüpfen (du besitzt sie) oder ein Subdomain-Setup"
      - "Google Business Profile-Link, Kontaktbutton, WhatsApp oder Telefon"
      - "Bilder- und Text-Setup nach deinem Input (du lieferst das Rohmaterial)"
      - "Live innerhalb von 7 Tagen, sobald ich mit deinem Material starte"
      - "Ein öffentlicher YouTube-Audit deiner alten Website (falls gewünscht)"
    excludesTitle: "Nicht drin (ehrlich gesagt)"
    excludes:

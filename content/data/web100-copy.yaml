      - "A guarantee that you fit in Q2 — the list fills up"
    note: "Want more? Say so. We'll scope a bigger project separately — but stay honest about the €100 above."
  audits:
    title: "Public audits"
    subtitle: "Every week I walk through real websites live on YouTube. Shoemakers, hotels, cafés. What works, what doesn't, what I'd do differently."
    watchCta: "Watch audit"
    emptyTitle: "First audits coming soon"
    emptyBody: "The moment the first video is live, it shows up here. Until then: subscribe on YouTube so you don't miss it."
    subscribeCta: "Subscribe on YouTube"
  bet:
    title: "Bet on it: will I hit 100?"
    body: "The bet is public. Vote on Telegram or X — if I hit 100, I'll DM you. If I don't, I owe the community ice cream."
    telegramCta: "Vote on Telegram"
    xCta: "Vote on X"
  form:
    title: "I want a website"
    subtitle: "Tell me briefly what you do and what you need. I'll reply within 48 hours — honest about whether Q2 fits."
    businessLabel: "What do you do? (e.g. shoemaker, café, dance studio)"
    businessPlaceholder: "e.g. shoemaker in Schwabing"
    urlLabel: "Do you already have a website? (optional)"
    urlPlaceholder: "https://..."
    descLabel: "What should the site do?"
    descPlaceholder: "e.g. opening hours, contact, a few photos of my work…"
    emailLabel: "Your email"
    emailPlaceholder: "you@example.com"
    languageLabel: "Preferred language for the site"
    languageOptionLabel:
      de: "Deutsch"
      en: "English"
      es: "Español"
      ru: "Русский"
      uk: "Українська"
      other: "Other"
    submit: "Send"
    submitting: "Sending…"
    successTitle: "Got it — thanks!"
    successBody: "I'll get back to you within 48 hours. If urgent, Telegram or email directly."
    errors:
      business: "Tell me briefly what you do."
      descMin: "A sentence or two is enough — but not empty."
      email: "I need a valid email to reply."
      urlFormat: "That doesn't look like a URL (e.g. https://example.com)."
      language: "Which language should it be in?"
  faq:
    title: "Frequently asked"
    items:
      - q: "Only €100? What's the catch?"
        a: "No catch, but a clear scope. For €100 you get a simple, honest website — no shop, no wild extensions, no giant scope. I can only do this because I'm building many similar sites in parallel and reusing templates. Want more? We scope a bigger project separately."
      - q: "What if I don't fit in Q2?"
        a: "It happens. 100 slots is 100 slots. Early requests go first. If the list fills up, you land on the waitlist — either wait for Q3 or we do a regular project (different budget)."
      - q: "How long does it really take?"
        a: "7 days from the moment I have your material (text, images, logo, contact). If you still have to gather your material, it takes longer. That's almost always the bottleneck — not my code."
      - q: "What if I don't like the result?"
        a: "One round of feedback is included — you say what's off, I adjust. If after round one we're still far apart, you pay only €50 and we part amicably. Nobody wants a website they don't like."
      - q: "Why do this publicly with YouTube audits?"
        a: "Because I find my people by thinking out loud. The audits let you see how I work before you spend €100. And they help me find clients who speak the same language."
      - q: "Can I keep building on the site myself later?"
        a: "Yes. You get the code, the domain is in your name, no lock-ins. Keep going on your own if you want. If you want maintenance, we talk about a separate monthly subscription."
  finalCta:
    title: "Ready for your €100 website?"
    body: "Drop me a line — 48 hours to reply, 7 days to ship."
    primary: "Fill out the form"
    secondary: "Book a call directly"
  seo:
    title: "100 websites × €100 — Marathon Q2 2026"
    description: "Website for €100 in Munich: 7 days, honest scope, with public YouTube audits. 100 small websites in Q2 2026 — for shoemakers, cafés, studios and hotels."

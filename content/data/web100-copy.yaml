    eyebrow: "Web100 · Pay what you want"
    title: "Ich baue deine Website — kostenlos. Du zahlst, was sie dir wert ist."
    subtitle: "Kleine, ehrliche Websites für Schuhmacher, Cafés, Tanzschulen, Hotels. Ich baue sie gratis. Wenn sie dir gefällt, zahlst du, was du für fair hältst — eine Spende, keine Rechnung."

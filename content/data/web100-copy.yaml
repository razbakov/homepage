      - "SEO-Optimierung über Basic-Metadaten hinaus"
      - "Monatlicher Support — du bekommst das Ergebnis, nicht den Vertrag"
    note: "Willst du mehr? Sag's. Dann bauen wir separat etwas Größeres — aber das hier oben bleibt gratis, mit einer Spende deiner Wahl."
  audits:
    title: "Öffentliche Audits"
    subtitle: "Ich gehe jede Woche durch echte Websites — live auf YouTube. Schuhmacher, Hotels, Cafés. Was funktioniert, was nicht, was ich anders machen würde."
    watchCta: "Audit ansehen"

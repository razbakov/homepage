# Copy for /web100 landing page.
# German is primary. Other locales are light translations — safe to copy-DE
# if not yet localized. Fallback order in the page: user locale -> de -> en.
#
# Keep tone: direct, warm, polyglot-but-grounded. Match razbakov.com voice.
# Do not hide the price. Do not add fake urgency.

de:
  hero:
    eyebrow: "Q2 2026 · Öffentliche Wette"
    title: "100 Websites. 100 € pro Stück. Schaffe ich das?"
    subtitle: "Ich baue in diesem Quartal 100 kleine Websites — jede für 100 Euro. Für Schuhmacher, Cafés, Tanzschulen, Hotels. Öffentlich, mit YouTube-Audits, und du kannst mitwetten."
    ctaPrimary: "Ich will eine Website"
    ctaSecondary: "Auf die Wette tippen"
    progressLabel: "Websites fertig"
    progressOf: "von"
    statusPrefix: "Stand heute"
  offer:
    title: "Was du für 100 € bekommst — und was nicht"
    includesTitle: "Drin für 100 €"
    includes:
      - "Eine einfache, mobile Website — Landing Page mit bis zu 5 Abschnitten"
      - "Eigene Domain verknüpfen (du besitzt sie) oder ein Subdomain-Setup"
      - "Google Business Profile-Link, Kontaktbutton, WhatsApp oder Telefon"
      - "Bilder- und Text-Setup nach deinem Input (du lieferst das Rohmaterial)"
      - "Live innerhalb von 7 Tagen, sobald ich mit deinem Material starte"
      - "Ein öffentlicher YouTube-Audit deiner alten Website (falls gewünscht) — gratis"
    excludesTitle: "Nicht drin (ehrlich gesagt)"
    excludes:
      - "Copywriting von null — du schickst die Texte, ich bringe sie in Form"
      - "Logo-Design oder neues Branding"
      - "Shop mit Bezahlung, Buchungssystem, Login-Bereich"
      - "SEO-Optimierung über Basic-Metadaten hinaus"
      - "Monatlicher Support — für 100 € bekommst du das Ergebnis, nicht den Vertrag"
      - "Garantie, dass du in Q2 drankommst — die Liste wird voll"
    note: "Willst du mehr? Sag's. Dann bauen wir separat etwas Größeres — aber ehrlich zu den 100 € hier oben."
  audits:
    title: "Öffentliche Audits"
    subtitle: "Ich gehe jede Woche durch echte Websites — live auf YouTube. Schuhmacher, Hotels, Cafés. Was funktioniert, was nicht, was ich anders machen würde."
    watchCta: "Audit ansehen"
    emptyTitle: "Die ersten Audits kommen bald"
    emptyBody: "Sobald das erste Video live ist, erscheint es hier. In der Zwischenzeit: abonniere auf YouTube, um nichts zu verpassen."
    subscribeCta: "Auf YouTube abonnieren"
  bet:
    title: "Tippe mit: Schaffe ich die 100?"
    body: "Die Wette ist öffentlich. Tippe mit auf Telegram oder X — wenn ich die 100 schaffe, schreibe ich dir. Wenn nicht, schulde ich der Community ein Eis."
    telegramCta: "Auf Telegram tippen"
    xCta: "Auf X tippen"
  form:
    title: "Ich will eine Website"
    subtitle: "Sag mir kurz, was du machst und was du brauchst. Ich melde mich innerhalb von 48 Stunden — ehrlich, ob es für Q2 passt."
    businessLabel: "Was machst du? (z. B. Schuhmacher, Café, Tanzschule)"
    businessPlaceholder: "z. B. Schuhmacher in Schwabing"
    urlLabel: "Hast du schon eine Website? (optional)"
    urlPlaceholder: "https://..."
    descLabel: "Was soll die Website tun?"
    descPlaceholder: "z. B. Öffnungszeiten, Kontakt, ein paar Bilder meiner Arbeit…"
    emailLabel: "Deine E-Mail"
    emailPlaceholder: "du@beispiel.de"
    languageLabel: "Bevorzugte Sprache für die Website"
    languageOptionLabel:
      de: "Deutsch"
      en: "English"
      es: "Español"
      ru: "Русский"
      uk: "Українська"
      other: "Andere"
    submit: "Absenden"
    submitting: "Wird gesendet…"
    successTitle: "Angekommen — danke!"
    successBody: "Ich melde mich innerhalb von 48 Stunden. Wenn's dringend ist: Telegram oder E-Mail direkt."
    errors:
      business: "Bitte sag mir kurz, was du machst."
      descMin: "Ein, zwei Sätze reichen — aber ganz leer geht nicht."
      email: "Ich brauche eine gültige E-Mail, um zurückzuschreiben."
      urlFormat: "Das sieht nicht nach einer URL aus (z. B. https://beispiel.de)."
      language: "Welche Sprache soll's werden?"
  faq:
    title: "Häufige Fragen"
    items:
      - q: "Nur 100 €? Was ist der Haken?"
        a: "Kein Haken, aber ein klarer Rahmen. Für 100 € bekommst du eine einfache, ehrliche Website — kein Shop, keine Extrawürste, kein Riesen-Scope. Ich schaffe das nur, weil ich viele ähnliche Sites parallel baue und die Templates wiederverwende. Willst du mehr, sprechen wir separat über ein größeres Projekt."
      - q: "Was, wenn ich nicht in Q2 drankomme?"
        a: "Kann passieren. 100 Plätze sind 100 Plätze. Wer früh anfragt, ist vorne. Wenn die Liste voll ist, kommst du auf die Warteliste — entweder warte auf Q3 oder wir machen ein reguläres Projekt (anderes Budget)."
      - q: "Wie lange dauert es wirklich?"
        a: "7 Tage ab dem Moment, in dem ich dein Material habe (Texte, Bilder, Logo, Kontaktdaten). Wenn du dein Material erst noch besorgen musst, verlängert sich das. Das ist fast immer der Engpass, nicht mein Code."
      - q: "Was, wenn mir das Ergebnis nicht gefällt?"
        a: "Eine Runde Feedback ist drin — du sagst, was stört, ich passe an. Wenn wir nach der ersten Runde immer noch weit auseinander sind, zahlst du nur 50 € und wir trennen uns freundlich. Niemand will eine Website, die er nicht mag."
      - q: "Warum machst du das öffentlich mit YouTube-Audits?"
        a: "Weil ich meine Leute finde, indem ich laut denke. Die Audits helfen dir zu sehen, wie ich arbeite, bevor du 100 € ausgibst. Und sie helfen mir, Kunden zu finden, die die gleiche Sprache sprechen."
      - q: "Kann ich die Seite später selbst weiterbauen?"
        a: "Ja. Du bekommst den Code, die Domain läuft auf deinen Namen, keine Lock-ins. Wenn du willst, mach' weiter. Wenn du Wartung willst, reden wir über ein separates Monatsabo."
  finalCta:
    title: "Bereit für deine 100-€-Website?"
    body: "Schreib mir — 48 Stunden bis zur Rückmeldung, 7 Tage bis zur Live-Seite."
    primary: "Formular ausfüllen"
    secondary: "Direkt Termin buchen"
  seo:
    title: "100 Websites × 100 € — Marathon Q2 2026"
    description: "Website für 100 € in München: 7 Tage, ehrlich, mit öffentlichen YouTube-Audits. 100 kleine Websites in Q2 2026 — für Schuhmacher, Cafés, Studios und Hotels."

en:
  hero:
    eyebrow: "Q2 2026 · Public Challenge"
    title: "100 websites. €100 each. Can I pull it off?"
    subtitle: "I'm building 100 small websites this quarter — €100 each. For shoemakers, cafés, dance studios, hotels. Public, with YouTube audits, and you can bet on whether I hit the number."
    ctaPrimary: "I want a website"
    ctaSecondary: "Bet on the outcome"
    progressLabel: "websites done"
    progressOf: "of"
    statusPrefix: "Today"
  offer:
    title: "What €100 gets you — and what it doesn't"
    includesTitle: "Included for €100"
    includes:
      - "A simple, mobile-friendly website — landing page with up to 5 sections"
      - "Connect your own domain (you own it) or set up a subdomain"
      - "Google Business Profile link, contact button, WhatsApp or phone"
      - "Image and text setup from your input (you provide the raw material)"
      - "Live within 7 days once I start with your content"
      - "A public YouTube audit of your current site (if you want it) — free"
    excludesTitle: "Not included (being honest)"
    excludes:
      - "Copywriting from scratch — send me your text, I'll shape it"
      - "Logo design or new branding"
      - "E-commerce, checkout, booking systems, member areas"

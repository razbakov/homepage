    xCta: "Auf X folgen"
  form:
    title: "Ich will eine Website"
    subtitle: "Sag mir kurz, was du machst und was du brauchst. Ich melde mich innerhalb von 48 Stunden."
    businessLabel: "Was machst du? (z. B. Schuhmacher, Café, Tanzschule)"
    businessPlaceholder: "z. B. Schuhmacher in Schwabing"
    urlLabel: "Hast du schon eine Website? (optional)"
    urlPlaceholder: "https://..."
    descLabel: "Was soll die Website tun?"
    descPlaceholder: "z. B. Öffnungszeiten, Kontakt, ein paar Bilder meiner Arbeit…"
    emailLabel: "Deine E-Mail"
    emailPlaceholder: "du@beispiel.de"
    languageLabel: "Bevorzugte Sprache für die Website"
    languageOptionLabel:
      de: "Deutsch"
      en: "English"
      es: "Español"
      ru: "Русский"
      uk: "Українська"
      other: "Andere"
    submit: "Absenden"
    submitting: "Wird gesendet…"
    successTitle: "Angekommen — danke!"
    successBody: "Ich melde mich innerhalb von 48 Stunden. Wenn's dringend ist: Telegram oder E-Mail direkt."
    errors:
      business: "Bitte sag mir kurz, was du machst."
      descMin: "Ein, zwei Sätze reichen — aber ganz leer geht nicht."
      email: "Ich brauche eine gültige E-Mail, um zurückzuschreiben."
      urlFormat: "Das sieht nicht nach einer URL aus (z. B. https://beispiel.de)."
      language: "Welche Sprache soll's werden?"
  faq:
    title: "Häufige Fragen"
    items:
      - q: "Wirklich kostenlos? Was ist der Haken?"
        a: "Kein Haken, aber ein klarer Rahmen. Du bekommst eine einfache, ehrliche Website — kein Shop, keine Extrawürste, kein Riesen-Scope. Ich kann das nur machen, weil ich viele ähnliche Sites parallel baue und Templates wiederverwende. Gefällt sie dir, zahlst du, was du für fair hältst. Willst du mehr, sprechen wir separat über ein größeres Projekt."
      - q: "Wie viel soll ich denn zahlen?"
        a: "Was du willst — auch null ist okay. Pay what you want heißt: du entscheidest, was die Website dir wert ist. Manche zahlen den Preis eines Abendessens, manche mehr, manche spenden später, wenn die Seite Kunden bringt. Kein Druck."
      - q: "Wie lange dauert es wirklich?"
        a: "7 Tage ab dem Moment, in dem ich dein Material habe (Texte, Bilder, Logo, Kontaktdaten). Wenn du dein Material erst noch besorgen musst, verlängert sich das. Das ist fast immer der Engpass, nicht mein Code."
      - q: "Was, wenn mir das Ergebnis nicht gefällt?"
        a: "Eine Runde Feedback ist drin — du sagst, was stört, ich passe an. Gefällt es dir am Ende nicht, zahlst du einfach nichts. Niemand will eine Website, die er nicht mag."
      - q: "Warum machst du das öffentlich mit YouTube-Audits?"
        a: "Weil ich meine Leute finde, indem ich laut denke. Die Audits helfen dir zu sehen, wie ich arbeite, bevor wir starten. Und sie helfen mir, Kunden zu finden, die die gleiche Sprache sprechen."
      - q: "Kann ich die Seite später selbst weiterbauen?"
        a: "Ja. Du bekommst den Code, die Domain läuft auf deinen Namen, keine Lock-ins. Wenn du willst, mach' weiter. Wenn du Wartung willst, reden wir über ein separates Monatsabo."
  finalCta:
    title: "Bereit für deine kostenlose Website?"
    body: "Schreib mir — 48 Stunden bis zur Rückmeldung, 7 Tage bis zur Live-Seite. Zahlen tust du nur, was sie dir wert ist."
    primary: "Formular ausfüllen"
    secondary: "Direkt Termin buchen"
  seo:
    title: "Web100 — kostenlose Website, pay what you want"
    description: "Kostenlose Website in München: 7 Tage, ehrlich, mit öffentlichen YouTube-Audits. Ich baue kleine Websites für Schuhmacher, Cafés, Studios und Hotels — du zahlst, was sie dir wert ist."

